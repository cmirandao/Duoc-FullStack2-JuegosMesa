<div class="principal d-flex align-items-center justify-content-center">
    <div class="registro-contenedor" style="width: 100%; max-width: 450px;">
        <header class="encabezado" id="inicio">
            <div class="contenedor encabezado-contenido">
                <h1>SEV Toys</h1>
                <h2 class="fs-4">Iniciar Sesión</h2>
            </div>
        </header>

        <form class="registro-contenedor" [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><span class="material-symbols-outlined">mail</span></span>
                    <input type="email" class="form-control" formControlName="email"
                        [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                    <div class="invalid-feedback">Ingresa un correo válido.</div>
                </div>

            </div>

            <div class="mb-4">
                <label for="loginPassword" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><span class="material-symbols-outlined">lock</span></span>
                    <input type="password" class="form-control" id="loginPassword" formControlName="password"
                        [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    <div class="invalid-feedback">La contraseña es obligatoria.</div>
                </div>
                <!-- Enlace de recuperacion -->
                <div class="text-end mt-2">
                    <a routerLink="/recuperar"
                        style="color: var(--color-principal); text-decoration: none; font-size: 0.9rem;">¿Olvidaste tu
                        contraseña?</a>
                </div>
            </div>
            <!-- Boton de envio -->
            <button type="submit" class="btn-enviar w-100 mb-3" [disabled]="loginForm.invalid">Ingresar</button>

            <div class="text-center mt-3">
                <span class="text-muted">¿No tienes cuenta? </span>
                <a routerLink="/registro"
                    style="color: var(--color-secundario); font-weight: bold; text-decoration: none;">Regístrate
                    aquí</a>
            </div>
            <!-- Enlace de retorno -->
            <div class="text-center mt-3">
                <a routerLink="/catalogo" class="text-muted" style="text-decoration: none;"><span
                        class="material-symbols-outlined align-middle fs-6">arrow_back</span> Volver a la tienda</a>
            </div>
        </form>
    </div>
</div>
